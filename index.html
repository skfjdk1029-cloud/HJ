<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>윷놀이 v77</title>
<style>
*{box-sizing:border-box}
body{
  user-select:none;
  margin:0;
  background:#f6f1e7;
  color:#222;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:auto;
}
button,input{font:inherit}
button{
  border:1px solid #3b302a;
  background:#fff;
  border-radius:10px;
  padding:9px 12px;
  cursor:pointer;
}
button:hover{background:#f1e4ce}
button:disabled{opacity:.45;cursor:not-allowed}
.screen{
  width:100vw;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.card{
  width:min(760px,96vw);
  background:#fffaf0;
  border:2px solid #3b302a;
  border-radius:18px;
  padding:22px;
  box-shadow:0 12px 25px rgba(0,0,0,.12);
}
