<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>윷놀이 v77</title>
<style>
*{box-sizing:border-box}
body{
  user-select:none;
  margin:0;
  background:#f6f1e7;
  color:#222;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:auto;
}
button,input{font:inherit}
button{
  border:1px solid #3b302a;
  background:#fff;
  border-radius:10px;
  padding:9px 12px;
  cursor:pointer;
}
button:hover{background:#f1e4ce}
button:disabled{opacity:.45;cursor:not-allowed}
.screen{
  width:100vw;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.card{
  width:min(760px,96vw);
  background:#fffaf0;
  border:2px solid #3b302a;
  border-radius:18px;
  padding:22px;
  box-shadow:0 12px 25px rgba(0,0,0,.12);
}
h1{margin:0 0 10px;font-size:32px}
h2{margin:18px 0 8px;font-size:19px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.modeBtn.active{background:#3b302a;color:#fff}
.startBtn{
  margin-top:18px;
  width:100%;
  padding:14px;
  font-size:18px;
  background:#2f241f;
  color:white;
}

.game{
  width:1920px;
  height:1080px;
  display:grid;
  grid-template-columns:340px 1fr 430px;
  gap:18px;
  padding:18px;
  margin:0 auto;
  background:#efe1c8;
}
.leftPanel,.boardPanel,.sidePanel{
  background:#fffaf0;
  border:2px solid #3b302a;
  border-radius:18px;
  padding:14px;
  min-height:0;
}
.leftPanel{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.boardPanel{
  position:relative;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:18px;
  padding-bottom:190px;
  overflow:hidden;
}
.sidePanel{
  display:flex;
  flex-direction:column;
  min-height:0;
}
#board{
  width:860px;
  height:860px;
  display:block;
  background:#fff8e9;
  border-radius:16px;
  border:1px solid rgba(59,48,42,.18);
}
.node{fill:#fff;stroke:#3b302a;stroke-width:3}
.corner{fill:#f3dfb8}
.center{fill:#ffe1a6}
.startNode{fill:#e9f7ff}
.path{stroke:#6b5144;stroke-width:5;stroke-linecap:round;fill:none;opacity:.45}
.piece{stroke:#1c1715;stroke-width:2.5;cursor:pointer}
.pieceText{font-size:12px;font-weight:800;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
.selected{stroke:#000;stroke-width:5;filter:drop-shadow(0 0 5px rgba(0,0,0,.55))}
.infoBox{
  border:1px solid #6b5144;
  border-radius:12px;
  padding:10px;
  background:#fffdf8;
  margin-bottom:10px;
}
.turnTitle{
  font-weight:900;
  font-size:20px;
  display:flex;
  align-items:center;
  gap:10px;
}
.turnColorDot{
  width:22px;
  height:22px;
  border-radius:50%;
  border:3px solid #1c1715;
  display:inline-block;
}
.small{font-size:14px;opacity:.82}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.moveCard{
  width:62px;
  height:62px;
  border:2px solid #3b302a;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  font-size:16px;
  font-weight:900;
  line-height:1.05;
  padding:0;
}
.moveCard.active{background:#2f241f;color:white}
.log{
  height:215px;
  overflow:auto;
  background:#211b18;
  color:#f9efd9;
  border-radius:12px;
  padding:10px;
  font-size:13px;
  line-height:1.45;
}
.hidden{display:none}
.rules{
  font-size:13px;
  line-height:1.45;
  background:#fffdf8;
  border:1px dashed #6b5144;
  padding:10px;
  border-radius:12px;
}
.yutArea{
  background:#f4e3c3;
  border:2px solid #6b5144;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  min-height:128px;
}
.yutStage{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:center;
  min-height:78px;
}
.stick{
  width:36px;
  height:76px;
  border-radius:18px;
  border:2px solid #3b302a;
  background:linear-gradient(90deg,#b86b28,#e3a15b);
  box-shadow:0 4px 8px rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:12px;
  color:#3b2415;
  position:relative;
  transition:transform .25s ease;
}
.stick.back{background:linear-gradient(90deg,#fff9ea,#f0dfbd)}
.stick.back::after{
  content:"";
  width:10px;
  height:10px;
  background:#3b2415;
  border-radius:50%;
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
}
.stick.baekdo{
  background:linear-gradient(90deg,#fff6dd,#e6ca93);
  color:#8b1d1d;
  writing-mode:vertical-rl;
  letter-spacing:1px;
}
.stick.baekdo::after{
  content:"";
  width:9px;
  height:9px;
  background:#8b1d1d;
  border-radius:50%;
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

.stick.baekdoMark::before{
  content:"백도윷\A▼";
  white-space:pre;
  position:absolute;
  top:-42px;
  left:50%;
  transform:translateX(-50%);
  writing-mode:horizontal-tb;
  letter-spacing:-.5px;
  color:#d83a2e;
  font-size:12px;
  line-height:1.05;
  font-weight:1000;
  text-align:center;
  text-shadow:0 2px 0 rgba(255,255,255,.88);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));
  animation:baekdoPointerBounce .72s ease-in-out infinite;
  z-index:4;
  pointer-events:none;
}
@keyframes baekdoPointerBounce{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-8px)}
}
body.mobile:not(.yutThrowing) .mobileYutSlot .stick.baekdoMark::before{
  content:"▼";
  top:-17px;
  font-size:14px;
  line-height:1;
}
body.mobile.yutThrowing .mobileYutSlot .stick.baekdoMark::before{
  top:-40px;
  font-size:12px;
}
.stick.rolling{animation:toss .55s ease-in-out infinite alternate}
.stick:nth-child(2){transform:rotate(-5deg)}
.stick:nth-child(3){transform:rotate(6deg)}
.stick:nth-child(4){transform:rotate(-2deg)}
@keyframes toss{
  0%{transform:translateY(0) rotate(-18deg)}
  50%{transform:translateY(-22px) rotate(35deg)}
  100%{transform:translateY(6px) rotate(-28deg)}
}
.yutResult{text-align:center;font-weight:900;font-size:18px;margin-top:6px}
.hintArrowShadow{
  fill:rgba(0,0,0,.22);
  cursor:pointer;
}
.hintArrowBody{
  fill:#f5b942;
  stroke:#5b3a12;
  stroke-width:2;
  cursor:pointer;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.28));
}
.hintArrowHighlight{
  fill:rgba(255,255,255,.5);
  pointer-events:none;
}
.hintText{
  font-size:11px;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
  pointer-events:none;
  fill:#4a2d0d;
  opacity:.88;
}
.alertBanner{
  margin-top:8px;
  padding:9px 10px;
  border-radius:12px;
  border:2px solid #8b4513;
  background:#fff0ba;
  font-weight:900;
  text-align:center;
  display:none;
}
.alertBanner.show{display:block}
.reserveTitle{
  font-size:24px;
  font-weight:900;
  margin-bottom:4px;
}
.reserveSub{
  font-size:13px;
  opacity:.78;
  margin-bottom:8px;
}
.reserveGrid{
  display:grid;
  grid-template-rows:repeat(4,1fr);
  gap:10px;
  flex:1;
  min-height:0;
}
.reserveLane{
  border:2px solid #6b5144;
  border-radius:14px;
  background:#fffdf8;
  padding:10px;
  display:flex;
  flex-direction:column;
  min-height:0;
}
.reserveLane.inactive{
  opacity:.35;
}
.reserveLaneHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-weight:900;
  margin-bottom:8px;
}
.reserveName{
  display:flex;
  align-items:center;
  gap:8px;
}
.reserveDot{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #1c1715;
}
.reservePieces{
  display:flex;
  flex-wrap:wrap;
  align-content:flex-start;
  gap:7px;
  overflow:auto;
  padding:4px;
}
.reservePiece{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid #1c1715;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:13px;
  cursor:pointer;
  flex:0 0 auto;
}
.reservePiece.selected{
  outline:4px solid #111;
  outline-offset:2px;
}
.reserveStats{
  font-size:12px;
  opacity:.75;
}
@media(max-width:1919px){
  .game{
    transform-origin:top left;
  }
}

.piece, .reservePiece, .bottomPiece{
  transition:transform .12s ease, filter .12s ease;
  transform-box:fill-box;
  transform-origin:center;
}
.piece:hover, .reservePiece:hover, .bottomPiece:hover{
  transform:scale(1.18);
  filter:drop-shadow(0 0 8px rgba(0,0,0,.42));
}
.bottomReserve{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:860px;
  min-height:138px;
  background:rgba(255,250,240,.94);
  border:2px solid #3b302a;
  border-radius:18px;
  padding:10px 14px;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:3;
}
.bottomReserveTitle{
  font-size:19px;
  font-weight:900;
  text-align:center;
}
.bottomReservePieces{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
.bottomPiece{
  width:76px;
  height:76px;
  border-radius:50%;
  border:4px solid #1c1715;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:28px;
  cursor:pointer;
}
.bottomPiece.selected{
  outline:4px solid #111;
  outline-offset:2px;
}
.boardPanel{
  position:relative;
}
.exitButton{
  fill:#d94a38;
  stroke:#5b120c;
  stroke-width:2.5;
  cursor:pointer;
  filter:drop-shadow(0 4px 4px rgba(0,0,0,.32));
}
.exitButton:hover{
  fill:#ff654f;
}
.exitText{
  font-size:13px;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
  pointer-events:none;
  fill:#fff;
}


.bigRollBtn{
  width:100%;
  padding:22px 18px;
  font-size:32px;
  font-weight:900;
  border-radius:18px;
  background:#2f241f;
  color:#fff;
  border:2px solid #1d1511;
  box-shadow:0 6px 14px rgba(0,0,0,.18);
}
.bigRollBtn:hover{background:#47362f}
.actionRow{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.subBtn{
  flex:1;
  padding:12px 14px;
  font-weight:800;
}


.centerTurnBanner{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(.96);
  min-width:520px;
  padding:34px 54px;
  border-radius:28px;
  border:5px solid #2b2018;
  background:linear-gradient(180deg, rgba(255,248,228,.98), rgba(243,226,188,.98));
  box-shadow:0 18px 45px rgba(0,0,0,.32);
  font-size:72px;
  font-weight:1000;
  text-align:center;
  z-index:999;
  letter-spacing:-1.5px;
  opacity:0;
  pointer-events:none;
  display:none;
}
.centerTurnBanner .bannerDot{
  width:42px;
  height:42px;
  border-radius:50%;
  border:5px solid #1c1715;
  display:inline-block;
  vertical-align:-5px;
  margin-right:18px;
}
.centerTurnBanner.show{
  display:block;
  animation:turnToast 1s ease forwards;
}
@keyframes turnToast{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.88)}
  10%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.04)}
}
.reserveLane.activeTurn{
  box-shadow:0 0 0 4px rgba(255,255,255,.95), 0 0 0 8px var(--activeColor), 0 8px 18px rgba(0,0,0,.12);
  border-color:var(--activeColor);
}


/* v17: simple yut throw display restore */
.yutArea{
  background:#f4e3c3 !important;
  border:2px solid #6b5144 !important;
  border-radius:14px !important;
  padding:12px !important;
  margin-top:10px !important;
  min-height:128px !important;
  box-shadow:none !important;
